<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天开心嘛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 粒子效果相关样式 */
        .sparkle {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            pointer-events: none;
            opacity: 1;
        }
        
        .heart-particle {
            position: absolute;
            pointer-events: none;
            opacity: 1;
            font-size: 16px;
        }
        
        /* 优化按钮交互的动画 */
        @keyframes buttonPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 46, 99, 0.8);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(255, 46, 99, 1);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 46, 99, 0.8);
            }
        }
        
        #yes-button:hover {
            animation: buttonPulse 1s ease-in-out infinite;
        }
        
        /* 音乐控制按钮样式 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 46, 99, 0.8);
            border-radius: 50%;
            display: none; /* 隐藏音乐控制按钮 */
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 46, 99, 0.8);
        }
        
        .music-control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 46, 99, 1);
        }
        
        .music-icon {
            width: 20px;
            height: 20px;
            border-left: 8px solid #fff;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            margin-left: 3px;
        }
        
        .music-icon.paused::before, .music-icon.paused::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 20px;
            background-color: #fff;
        }
        
        .music-icon.paused::before {
            left: 18px;
        }
        
        .music-icon.paused::after {
            right: 18px;
        }
        
        .music-icon.paused {
            border: none;
            margin: 0;
        }
        
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* SVG 容器样式 */
        svg {
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(255, 46, 99, 0.8));
        }
        
        /* 心形路径样式 */
        #heart-path {
            fill: none;
            stroke: #ff2e63;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }
        
        #heart-fill {
            fill: rgba(255, 46, 99, 0.0);
        }
        
        /* 文字样式 */
        #name-text {
            font-size: 24px;
            font-weight: bold;
            fill: #fff;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            /* 文字在对话框心形完成后显示 */
        }
        
        /* 按钮样式 */
        #yes-button {
            position: relative;
            margin-top: 30px;
            padding: 10px 30px;
            background: transparent;
            border: 2px solid #ff2e63;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 30px;
            opacity: 0;
            /* 按钮在对话框心形完成后显示 */
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        #yes-button:hover {
            background: rgba(255, 46, 99, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.8);
        }
        
        /* 模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 100;
        }
        
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #ff2e63, #ff5f6d);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 46, 99, 0.8);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            max-width: 500px;
            width: 90%;
        }
        
        .modal.active .modal-content {
            transform: scale(1);
        }
        
        .modal-title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .form-group {
            text-align: left;
        }
        
        .form-label {
            display: block;
            color: #fff;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            background-color: rgba(255, 255, 255, 0.9);
            transition: background-color 0.3s ease;
        }
        
        .form-input:focus {
            background-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .submit-button {
            background: #fff;
            color: #ff2e63;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }
        
        .modal-message {
            color: #666;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        /* 幸运轮盘样式 */
        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .wheel {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 8px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            transition: transform 3s ease-in-out;
        }
        
        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            writing-mode: vertical-rl;
            padding: 20px;
            overflow: hidden;
        }
        
        .wheel-section:nth-child(1) { background-color: #ff2e63; transform: rotate(0deg); }
        .wheel-section:nth-child(2) { background-color: #ffbc42; transform: rotate(60deg); }
        .wheel-section:nth-child(3) { background-color: #08d9d6; transform: rotate(120deg); }
        .wheel-section:nth-child(4) { background-color: #252a34; transform: rotate(180deg); }
        .wheel-section:nth-child(5) { background-color: #00adb5; transform: rotate(240deg); }
        .wheel-section:nth-child(6) { background-color: #f72585; transform: rotate(300deg); }
        
        .wheel-pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            /* 改进的指针样式 - 调整位置使其精确指向轮盘中心 */
        }
        
        /* 打分功能样式 */
        .rating-container {
            margin: 30px 0;
            text-align: center;
        }
        
        .rating-title {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        .rating-stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .star {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #fff;
        }
        
        .star:hover {
            background-color: rgba(255, 46, 99, 0.8);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 46, 99, 0.8);
        }
        
        .star.active {
            background-color: #ff2e63;
            box-shadow: 0 0 20px rgba(255, 46, 99, 1);
        }
        
        .rating-result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff !important;
            text-align: center;
            z-index: 100;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }
        
        .wheel-pointer::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 30px solid #ff2e63;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        
        .wheel-pointer::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 15px;
            background-color: #fff;
            border-radius: 2px;
        }
        
        .spin-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #fff;
            border: 4px solid #252a34;
            color: #252a34;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
        }
        
        .spin-button:hover {
            background-color: #ff2e63;
            color: white;
            border-color: #ff2e63;
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .spin-button:disabled {
            background-color: #ccc;
            color: #666;
            border-color: #ccc;
            cursor: not-allowed;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .prize-result {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #ff2e63;
            min-height: 25px;
        }
        
        /* 响应式模态框 */
        @media (max-width: 480px) {
            .modal-content {
                padding: 20px;
            }
            
            .modal-title {
                font-size: 20px;
            }
            
            .form-input {
                font-size: 14px;
            }
        }
        
        /* 背景光效 */
        .background-glow {
            position: absolute;
            background: radial-gradient(circle, rgba(255,46,99,0.3) 0%, rgba(255,46,99,0) 70%);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
            animation: glowAppear 1s ease-out forwards 3.5s;
        }
        
        .glow-1 {
            width: 500px;
            height: 500px;
        }
        
        .glow-2 {
            width: 700px;
            height: 700px;
            animation-delay: 3.8s;
        }
        
        /* 星光效果 */
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        
        /* 对话框气泡效果 */
        .bubble {
            position: absolute;
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 120px;
            word-wrap: break-word;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 2;
            font-size: 14px;
            line-height: 1.4;
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 36px;
        }
        
        /* 丰富的颜色样式 */
        .bubble.pink {
            background-color: #ff6b9d;
            color: white;
        }
        
        .bubble.purple {
            background-color: #9c27b0;
            color: white;
        }
        
        .bubble.yellow {
            background-color: #ffeb3b;
            color: #333;
        }
        
        .bubble.green {
            background-color: #4caf50;
            color: white;
        }
        
        .bubble.blue {
            background-color: #2196f3;
            color: white;
        }
        
        .bubble.orange {
            background-color: #ff9800;
            color: white;
        }
        
        .bubble.teal {
            background-color: #009688;
            color: white;
        }
        
        .bubble.red {
            background-color: #f44336;
            color: white;
        }
        
        .bubble.indigo {
            background-color: #3f51b5;
            color: white;
        }
        
        .bubble.lime {
            background-color: #cddc39;
            color: #333;
        }
        
        .bubble.appear {
            animation: bubbleAppear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .bubble.float {
            animation: bubbleFloat 4s ease-in-out infinite;
        }
        
        /* 背景装饰心形 */
        .heart-decoration {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        
        .heart-decoration.appear {
            animation: heartDecorationAppear 1s ease-out forwards;
        }
        
        /* 下落星星 */
        .falling-star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
        }
        
        /* 动画定义 */
        @keyframes drawHeart {
            0% {
                stroke-dashoffset: 1000;
            }
            100% {
                stroke-dashoffset: 0;
            }
        }
        
        @keyframes fillHeart {
            0% {
                fill: rgba(255, 46, 99, 0.0);
            }
            100% {
                fill: rgba(255, 46, 99, 0.5);
            }
        }
        
        @keyframes revealText {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes revealButton {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fallStar {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(200vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @keyframes glowAppear {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 0.8;
                transform: scale(1);
            }
        }
        
        @keyframes bubbleAppear {
            0% {
                opacity: 0;
                transform: scale(0) translateY(20px);
            }
            70% {
                opacity: 1;
                transform: scale(1.1) translateY(0);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        @keyframes bubbleFloat {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(2deg);
            }
        }
        
        @keyframes heartDecorationAppear {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-10deg);
            }
            70% {
                opacity: 0.3;
                transform: scale(1.05) rotate(0deg);
            }
            100% {
                opacity: 0.2;
                transform: scale(1) rotate(0deg);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            svg {
                width: 300px;
                height: 280px;
            }
            
            #name-text {
                font-size: 18px;
            }
            
            #yes-button {
                font-size: 16px;
                padding: 8px 20px;
            }
            
            .glow-1 {
                width: 350px;
                height: 350px;
            }
            
            .glow-2 {
                width: 500px;
                height: 500px;
            }
        }
        
        @media (max-width: 480px) {
            svg {
                width: 250px;
                height: 230px;
            }
            
            #name-text {
                font-size: 16px;
            }
            
            #yes-button {
            font-size: 14px;
            padding: 6px 16px;
        }
        
        .glow-1 {
            width: 280px;
            height: 280px;
        }
        
        .glow-2 {
            width: 400px;
            height: 400px;
        }
        
        /* 计时工具样式 */
        .countdown-container {
            position: relative;
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 20px 30px;
            background: rgba(255, 46, 99, 0.8);
            border: 3px solid #ff2e63;
            border-radius: 30px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            opacity: 1;
            z-index: 9999; /* 提高层级确保在顶部 */
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.8);
            min-width: 300px;
            display: block; /* 确保是块元素 */
        }
        
        .countdown-days {
            font-size: 32px;
            font-weight: bold;
            color: #ffbc42;
            text-shadow: 0 0 15px rgba(255, 188, 66, 0.8);
            background: rgba(255, 188, 66, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        @media (max-width: 768px) {
            .countdown-container {
                font-size: 16px;
                padding: 12px 20px;
            }
            
            .countdown-days {
                font-size: 24px;
            }
        }
        
        @media (max-width: 480px) {
            .countdown-container {
                font-size: 14px;
                padding: 10px 15px;
            }
            
            .countdown-days {
                font-size: 20px;
            }
        }
        

        

    </style>
</head>
<body>
    <!-- 计时工具 -->
    
    <div class="container">
        
        <!-- 背景光效 -->
        <div class="background-glow glow-1"></div>
        <div class="background-glow glow-2"></div>
        
        <!-- 文字 -->
        <svg width="600" height="400" viewBox="0 0 600 400">
            <!-- 恢复原始心形路径 - 增大尺寸以包裹文字 -->
            <path id="heart-path" d="M300,80 C380,0 520,140 300,280 C80,140 220,0 300,80 Z" />
            <path id="heart-fill" d="M300,80 C380,0 520,140 300,280 C80,140 220,0 300,80 Z" />
            <text id="name-text" x="300" y="180" text-anchor="middle" dominant-baseline="middle" font-size="28">阿瑞什么时候有空</text>
        </svg>
        
        <!-- 可以按钮 -->
        <button id="yes-button">可以</button>
    </div>
    
    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicControl">
        <div class="music-icon" id="musicIcon"></div>
    </div>
    
    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
                    <h2 class="modal-title">今天开心嘛</h2>
                    
                    <!-- 打分功能 -->
                    <div class="rating-container">
                        <h3 class="rating-title">今天的心情打几分？</h3>
                        <div class="rating-stars">
                            <span class="star" data-score="1">1</span>
                            <span class="star" data-score="2">2</span>
                            <span class="star" data-score="3">3</span>
                            <span class="star" data-score="4">4</span>
                            <span class="star" data-score="5">5</span>
                            <span class="star" data-score="6">6</span>
                            <span class="star" data-score="7">7</span>
                            <span class="star" data-score="8">8</span>
                            <span class="star" data-score="9">9</span>
                            <span class="star" data-score="10">10</span>
                        </div>
                        <p id="rating-result" class="rating-result">请选择评分</p>
                    </div>
                    
                    <form id="modal-form" class="modal-form">
                        <div class="form-group">
                            <label for="address" class="form-label">地址</label>
                            <input type="text" id="address" name="address" placeholder="请输入您的地址" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="phone" class="form-label">手机号码</label>
                            <input type="tel" id="phone" name="phone" placeholder="请输入您的手机号" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="milk-tea" class="form-label">想对阿常说的话</label>
                            <input type="text" id="milk-tea" name="milk-tea" placeholder="请输入您想对阿常说的话" class="form-input" required>
                        </div>
                        <input type="hidden" id="rating" name="rating" value="">
                        <button type="submit" class="submit-button">确定</button>
                    </form>
                    <p class="modal-message">分享你的心情，让阿常知道你今天过得怎么样～</p>
                </div>
    </div>
    

    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 使用改进的算法生成心形曲线点
            function generateHeartPoints(size = 100, centerX = 0, centerY = 0, points = 100) {
                const heartPoints = [];
                
                for (let i = 0; i <= points; i++) {
                    const t = (i / points) * Math.PI * 2;
                    // 使用改进的心形曲线公式
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                    
                    // 调整坐标并添加到数组
                    heartPoints.push({
                        x: centerX + x * (size / 16),
                        y: centerY - y * (size / 16) // 注意这里是减号，因为SVG坐标是Y轴向下
                    });
                }
                
                return heartPoints;
            }

            function getRandomStartPosition() {
                const edge = Math.floor(Math.random() * 4); // 0: 上, 1: 右, 2: 下, 3: 左
                const offset = 100; // 屏幕外偏移量
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                
                switch(edge) {
                    case 0: // 上
                        return { x, y: -offset };
                    case 1: // 右
                        return { x: window.innerWidth + offset, y };
                    case 2: // 下
                        return { x, y: window.innerHeight + offset };
                    case 3: // 左
                        return { x: -offset, y };
                }
            }

                if (!ratingInput.value) {
                    alert('请先为今天的心情打分！');
                    return;
                }
                
                // 获取表单数据
                const address = document.getElementById('address').value;
                const phone = document.getElementById('phone').value;
                const message = document.getElementById('milk-tea').value;
                const rating = ratingInput.value;
                
                // 可以在这里添加数据处理逻辑
                console.log('地址:', address);
                console.log('手机号:', phone);
                console.log('想对阿常说的话:', message);
                console.log('评分:', rating);
                
                // 显示加载状态
                const submitButton = this.querySelector('button[type="submit"]');
                const originalText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.textContent = '发送中...';
                
                try {
                    // 准备用户信息用于邮件发送
                    const userInfo = {
                        address: address,
                        phone: phone,
                        message: message,
                        rating: rating
                    };
                    
                    // 调用邮件发送API
                    const emailResult = await sendEmail(userInfo);
                    console.log('邮件发送结果:', emailResult);
                    
                    // 发送成功提示
                    alert(`信息发送成功！\n已记录您的信息\n地址: ${address}\n手机号: ${phone}\n想对阿常说的话: ${message}\n今天的心情评分: ${rating}分\n\n感谢您的分享！`);
                    
                    // 保存信息到本地存储
                    saveOrderData({
                        address: address,
                        phone: phone,
                        message: message,
                        rating: rating
                    });
                } catch (error) {
                    // 异常处理
                    console.error('提交过程中发生错误:', error);
                    alert('提交过程中发生错误，请稍后重试');
                } finally {
                    // 恢复按钮状态
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                    
                    // 隐藏模态框
                    const modal = document.getElementById('modal');
                    modal.classList.remove('active');
                }
            });
            
            // 保存信息到localStorage
            function saveOrderData(data) {
                // 获取现有信息数据
                let messages = JSON.parse(localStorage.getItem('loveMessages') || '[]');
                
                // 添加新信息，包含时间戳
                const newMessage = {
                    ...data,
                    timestamp: new Date().toISOString()
                };
                
                // 添加到数组开头（最新的在前面）
                messages.unshift(newMessage);
                
                // 保存回localStorage
                localStorage.setItem('loveMessages', JSON.stringify(messages));
                
                // 更新数据面板
                updateDataPanel();
                
                return newMessage;
            }
            
            // 更新数据面板
            function updateDataPanel() {
                const dataPanel = document.getElementById('data-panel');
                if (!dataPanel) return; // 如果没有数据面板元素，则直接返回
                
                // 获取信息数据
                const messages = JSON.parse(localStorage.getItem('loveMessages') || '[]');
                
                // 清空现有内容
                dataPanel.innerHTML = '';
                
                // 添加标题
                const title = document.createElement('h3');
                title.textContent = '心情评分记录';
                dataPanel.appendChild(title);
                
                // 如果没有数据，显示提示信息
                if (messages.length === 0) {
                    const noData = document.createElement('p');
                    noData.textContent = '暂无评分数据';
                    dataPanel.appendChild(noData);
                    return;
                }
                
                // 创建表格
                const table = document.createElement('table');
                table.className = 'data-table';
                
                // 创建表头
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                ['地址', '手机号', '留言内容', '评分', '时间'].forEach(text => {
                    const th = document.createElement('th');
                    th.textContent = text;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);
                
                // 创建表格内容
                const tbody = document.createElement('tbody');
                messages.forEach(message => {
                    const row = document.createElement('tr');
                    
                    // 格式化时间
                    const formattedDate = new Date(message.timestamp).toLocaleString();
                    
                    // 添加单元格
                    [message.address, message.phone, message.message, message.rating || '-', formattedDate].forEach(text => {
                        const td = document.createElement('td');
                        td.textContent = text;
                        row.appendChild(td);
                    });
                    
                    tbody.appendChild(row);
                });
                table.appendChild(tbody);
                
                // 添加到面板
                dataPanel.appendChild(table);
            }
             
            // 添加点击模态框外部关闭模态框的功能
            const modal = document.getElementById('modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
            
            // 添加点击重新播放效果
            document.addEventListener('click', function(e) {
                // 如果点击的不是按钮，才重置动画
                if (e.target !== yesButton) {
                    // 重置心形路径动画
                    const heartPath = document.getElementById('heart-path');
                    heartPath.style.animation = 'none';
                    void heartPath.offsetWidth; // 触发重排
                    heartPath.style.animation = 'drawHeart 3s ease-in-out forwards';
                    
                    // 重置填充动画
                    const heartFill = document.getElementById('heart-fill');
                    heartFill.style.animation = 'none';
                    void heartFill.offsetWidth;
                    heartFill.style.animation = 'fillHeart 1s ease-in forwards 3.2s';
                    
                    // 重置文字动画
                    const nameText = document.getElementById('name-text');
                    nameText.style.animation = 'none';
                    void nameText.offsetWidth;
                    nameText.style.animation = 'revealText 1s ease-out forwards 4s';
                    
                    // 重置光效动画
                    const glows = document.querySelectorAll('.background-glow');
                    glows.forEach((glow, index) => {
                        glow.style.animation = 'none';
                        void glow.offsetWidth;
                        const delay = index === 0 ? '3.5s' : '3.8s';
                        glow.style.animation = `glowAppear 1s ease-out forwards ${delay}`;
                    });
                    
                    // 重置按钮状态
                    yesButton.style.animation = 'none';
                    void yesButton.offsetWidth;
                    yesButton.style.animation = 'revealButton 1s ease-out forwards 5s';
                    yesButton.disabled = false;
                    yesButton.style.opacity = '1';
                    yesButton.style.cursor = 'pointer';
                    
                    // 移除所有下落的星星
                    const fallingStars = document.querySelectorAll('.falling-star');
                    fallingStars.forEach(star => star.remove());
                }
            });

    // 初始化计时工具元素并计算天数
    function initCounter() {
        // 计算阿雯与阿常认识的天数函数
        function updateDaysCount() {
            // 设置认识的起始日期 (修改为实际日期)
            const startDate = new Date('2025-10-20'); // 这里可以设置为实际认识的日期
            const currentDate = new Date();
            
            // 计算两个日期之间的毫秒数差
            const timeDiff = currentDate.getTime() - startDate.getTime();
            
            // 转换为天数并向上取整（不足一天算一天）
            const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
            
            // 更新显示
            const daysCountElement = document.getElementById('days-count');
            if (daysCountElement) {
                daysCountElement.textContent = daysDiff;
            }
        }
        
        // 创建计时工具容器（隐藏状态）
        const counterDiv = document.createElement('div');
        counterDiv.id = 'daysCounter';
        counterDiv.style.cssText = 'position: fixed; top: 10px; left: 10px; right: 10px; z-index: 9999; background: #ff2e63; color: white; font-size: 24px; font-weight: bold; padding: 15px; text-align: center; border: 2px solid white; display: none;';
        
        // 创建文本内容
        const text1 = document.createTextNode('阿雯与阿常认识的第 ');
        const daysSpan = document.createElement('span');
        daysSpan.id = 'days-count';
        daysSpan.textContent = '10';
        const text2 = document.createTextNode(' 天');
        
        // 组装元素
        counterDiv.appendChild(text1);
        counterDiv.appendChild(daysSpan);
        counterDiv.appendChild(text2);
        
        // 添加到body
        document.body.insertBefore(counterDiv, document.body.firstChild);
        
        // 初始计算天数
        updateDaysCount();
        
        // 每分钟更新一次天数
        setInterval(updateDaysCount, 60000);
    }
    
    // 调用计时工具初始化函数
    initCounter();
});

    var audio = new Audio('../恋人.mp3');

    audio.onerror = function(e) {
